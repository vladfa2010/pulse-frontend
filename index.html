    <!-- Telegram OAuth popup callback handler                       -->
    <!-- Runs BEFORE React mounts. Extracts auth data from URL hash  -->
    <!-- and sends it to parent via postMessage, then closes popup.  -->
    <!-- ═══════════════════════════════════════════════════════════ -->
    <script>
      (function () {
        // Only run in a popup redirected from Telegram OAuth
        if (!window.location.hash.includes('tgAuthResult')) return

        try {
          // Parse URL-safe base64 from hash
          var b64 = window.location.hash
            .replace('#tgAuthResult=', '')
            .replace(/-/g, '+')
            .replace(/_/g, '/')

          var pad = b64.length % 4
          if (pad) b64 += new Array(5 - pad).join('=')

          var user = JSON.parse(atob(b64))

          // Primary: BroadcastChannel (no window.opener needed)
          try {
            var bc = new BroadcastChannel('telegram_oauth')
            bc.postMessage({ __telegramAuth: user })
            bc.close()
          } catch (e) {}

          // Fallback: window.opener (older browsers or if opener is still alive)
          if (window.opener) {
            window.opener.postMessage({ __telegramAuth: user }, '*')
          }

          window.close()
        } catch (e) {
          console.error('[TG OAuth] Failed to process callback:', e)
        }
      })()
    </script>
